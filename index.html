<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DevConf 2026</title>
    <link rel="stylesheet" href="./style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Darker+Grotesque:wght@300..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=League+Gothic&family=Michroma&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
  </head>
  <body>
    <header class="nav">
      <div class="nav-box">
        <div class="logo">
          <img src="./image/logo.png" alt="Logo" class="logo-img" />
        </div>

        <nav class="menu">
          <ul>
            <li>Speakers</li>
            <li>Schedule</li>
            <li>Tracks</li>
            <li>Venue</li>
            <li>Blog</li>
          </ul>
        </nav>
        <span class="btn btn-blue nav-btn">Register Now</span>
      </div>
    </header>
    <!-- banner section -->
    <section class="banner">
      <img
        src="./image/banner.jpg"
        alt="Conference Background"
        class="banner-img"
      />

      <div class="overlay"></div>

      <div class="banner-content">
        <h1 class="title">Code. <em>Connect.</em> Create.</h1>
        <p class="para">
          Join 3,000+ developers, designers and tech leaders for three days of
          hands-on workshops, bold ideas and honest conversations about where
          software is headed next.
        </p>
        <span class="btn btn-blue big-btn">Register Now</span>
      </div>
    </section>
  </body>
</html>
